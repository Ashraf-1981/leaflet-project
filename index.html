<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singapore Attractions</title>

  <!-- Google font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <!-- Font Awesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="sidebar">

    <h2>Singapore Attractions</h2>

  <div class="button-group">

    <button class="category-btn" data-category="All">All</button>
    <button class="category-btn" data-category="Nature">Nature</button>
    <button class="category-btn" data-category="Food">Food</button>
    <button class="category-btn" data-category="Malls">Malls</button>
    <button class="category-btn" data-category="Landmarks">Landmarks</button>

    <!-- Dropdown -->
    <select id="sort-dropdown">
    <option value="">Sort Attractions</option>
    <option value="name">Name (A-Z)</option>
    <option value="rating">Rating (Highest)</option>
</select>

    <!-- Checkbox -->
  <label>

    <!-- I use favourites Only because I have already created
     the favourite feature(heartIcon) -->
    <input type="checkbox" id="favourite-checkbox">
    Show Favourites Only

</label>

    <!-- Radio button -->
    <h4>View</h4>
      <input type="radio" id="show-all" name="view" value="all">
      <label for="show-all">All</label>

      <input type="radio" id="show-top" name="view" value="top">
      <label for="show-top">Top Rated (4.5+)</label>

  </div>

  <div id="card-container"></div>

</div>

    <!-- Search bar Input -->
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search attractions...">
      <i class="fa-solid fa-camera"></i>
      <i class="fa-solid fa-microphone"></i>
    </div>

    <div id="map"></div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Your JavaScript -->
  <script src="script.js"></script>
  <script src="buttons.js"></script>

</body>

</html>
